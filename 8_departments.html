<section id="departments" class="section">
    <h2 class="section-title">University Departments</h2>

<div class="row g-4 mb-4">

    <!-- CS & IT -->
    <div class="col-md-4 col-sm-6">
        <div class="glass-card text-center"
             onclick="showDepartmentDetails('CS & IT')"
             style="cursor: pointer;">

            <!-- NEW IMAGE -->
            <img src="DeptOfCS&IT.png" class="img-fluid rounded mb-3 dept-img">

            <i class="fa-solid fa-laptop-code fa-3x mb-3 text-info"></i>
            <h3 class="fw-bold text-white">CS & IT</h3>
            <p class="text-muted small">Computer Science & Information Technology</p>
        </div>
    </div>

    <!-- Business -->
    <div class="col-md-4 col-sm-6">
        <div class="glass-card text-center"
             onclick="showDepartmentDetails('Business School')"
             style="cursor: pointer;">

            <img src="business.jpg" class="img-fluid rounded mb-3 dept-img">

            <i class="fa-solid fa-chart-line fa-3x mb-3 text-warning"></i>
            <h3 class="fw-bold text-white">Business School</h3>
            <p class="text-muted small">Management & Commerce</p>
        </div>
    </div>

    <!-- Physics -->
    <div class="col-md-4 col-sm-6">
        <div class="glass-card text-center"
             onclick="showDepartmentDetails('Physics')"
             style="cursor: pointer;">

            <img src="physics.jpg" class="img-fluid rounded mb-3 dept-img">

            <i class="fa-solid fa-atom fa-3x mb-3 text-success"></i>
            <h3 class="fw-bold text-white">Physics</h3>
            <p class="text-muted small">Department of Physics</p>
        </div>
    </div>

</div>

    <div id="departmentDetails" class="details-box"></div>
</section>
