<div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="fa-solid fa-user-plus me-2 text-info"></i> New Registration</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form onsubmit="event.preventDefault(); alert('Registration submitted for approval!');">
                    <div class="mb-3">
                        <label class="form-label text-muted">Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Email Address</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-primary">Program Interested</label>
                        <select class="form-select">
                            <option>BCA</option>
                            <option>B.Sc</option>
                            <option>MCA</option>
                            <option>MBA</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-outline-glass w-100" style="background-color: var(--accent-1); color: black;">Register Now</button>
                </form>
            </div>
        </div>
    </div>
</div>
