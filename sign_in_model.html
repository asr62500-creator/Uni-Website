<div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="fa-solid fa-user-lock me-2 text-info"></i> Secure Login</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form onsubmit="event.preventDefault(); alert('Logged in securely!');">
                    <div class="mb-3">
                        <label class="form-label text-muted">Student ID / Email</label>
                        <input type="text" class="form-control" required placeholder="Enter UID">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-glow w-100">Access Portal</button>
                </form>
            </div>
        </div>
    </div>
</div>
